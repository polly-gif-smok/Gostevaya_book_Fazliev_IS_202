<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение удаления</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="confirm-box">
            <h1>⚠️ Удалить все сообщения?</h1>
            <p>Это действие нельзя отменить. Все сообщения будут удалены навсегда.</p>
            
            <form method="POST" action="/delete-all-confirm">
                <button type="submit" class="confirm-yes">Да, удалить всё</button>
                <a href="/" class="confirm-no">Отмена</a>
            </form>
        </div>
    </div>
</body>
</html>
